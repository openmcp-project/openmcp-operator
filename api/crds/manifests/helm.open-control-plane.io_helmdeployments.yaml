---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  labels:
    openmcp.cloud/cluster: platform
  name: helmdeployments.helm.open-control-plane.io
spec:
  group: helm.open-control-plane.io
  names:
    kind: HelmDeployment
    listKind: HelmDeploymentList
    plural: helmdeployments
    shortNames:
    - hd
    - hdeploy
    - helmdeploy
    singular: helmdeployment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              chartSource:
                description: ChartSource is the source of the helm chart.
                properties:
                  chartName:
                    description: |-
                      ChartName specifies the name of the chart.
                      Can be omitted for oci sources, required for git and helm sources.
                      For git sources, this is the path within the git repository to the chart.
                      For helm sources, append the version to the chart name using '@', e.g. 'external-dns@1.10.0' or omit for latest version.
                    type: string
                  git:
                    description: |-
                      GitRepositorySpec specifies the required configuration to produce an
                      Artifact for a Git repository.
                    properties:
                      ignore:
                        description: |-
                          Ignore overrides the set of excluded patterns in the .sourceignore format
                          (which is the same as .gitignore). If not provided, a default will be used,
                          consult the documentation for your version to find out what those are.
                        type: string
                      include:
                        description: |-
                          Include specifies a list of GitRepository resources which Artifacts
                          should be included in the Artifact produced for this GitRepository.
                        items:
                          description: |-
                            GitRepositoryInclude specifies a local reference to a GitRepository which
                            Artifact (sub-)contents must be included, and where they should be placed.
                          properties:
                            fromPath:
                              description: |-
                                FromPath specifies the path to copy contents from, defaults to the root
                                of the Artifact.
                              type: string
                            repository:
                              description: |-
                                GitRepositoryRef specifies the GitRepository which Artifact contents
                                must be included.
                              properties:
                                name:
                                  description: Name of the referent.
                                  type: string
                              required:
                              - name
                              type: object
                            toPath:
                              description: |-
                                ToPath specifies the path to copy contents to, defaults to the name of
                                the GitRepositoryRef.
                              type: string
                          required:
                          - repository
                          type: object
                        type: array
                      interval:
                        description: |-
                          Interval at which the GitRepository URL is checked for updates.
                          This interval is approximate and may be subject to jitter to ensure
                          efficient use of resources.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m|h))+$
                        type: string
                      provider:
                        description: |-
                          Provider used for authentication, can be 'azure', 'github', 'generic'.
                          When not specified, defaults to 'generic'.
                        enum:
                        - generic
                        - azure
                        - github
                        type: string
                      proxySecretRef:
                        description: |-
                          ProxySecretRef specifies the Secret containing the proxy configuration
                          to use while communicating with the Git server.
                        properties:
                          name:
                            description: Name of the referent.
                            type: string
                        required:
                        - name
                        type: object
                      recurseSubmodules:
                        description: |-
                          RecurseSubmodules enables the initialization of all submodules within
                          the GitRepository as cloned from the URL, using their default settings.
                        type: boolean
                      ref:
                        description: |-
                          Reference specifies the Git reference to resolve and monitor for
                          changes, defaults to the 'master' branch.
                        properties:
                          branch:
                            description: Branch to check out, defaults to 'master'
                              if no other field is defined.
                            type: string
                          commit:
                            description: |-
                              Commit SHA to check out, takes precedence over all reference fields.

                              This can be combined with Branch to shallow clone the branch, in which
                              the commit is expected to exist.
                            type: string
                          name:
                            description: |-
                              Name of the reference to check out; takes precedence over Branch, Tag and SemVer.

                              It must be a valid Git reference: https://git-scm.com/docs/git-check-ref-format#_description
                              Examples: "refs/heads/main", "refs/tags/v0.1.0", "refs/pull/420/head", "refs/merge-requests/1/head"
                            type: string
                          semver:
                            description: SemVer tag expression to check out, takes
                              precedence over Tag.
                            type: string
                          tag:
                            description: Tag to check out, takes precedence over Branch.
                            type: string
                        type: object
                      secretRef:
                        description: |-
                          SecretRef specifies the Secret containing authentication credentials for
                          the GitRepository.
                          For HTTPS repositories the Secret must contain 'username' and 'password'
                          fields for basic auth or 'bearerToken' field for token auth.
                          For SSH repositories the Secret must contain 'identity'
                          and 'known_hosts' fields.
                        properties:
                          name:
                            description: Name of the referent.
                            type: string
                        required:
                        - name
                        type: object
                      serviceAccountName:
                        description: |-
                          ServiceAccountName is the name of the Kubernetes ServiceAccount used to
                          authenticate to the GitRepository. This field is only supported for 'azure' provider.
                        type: string
                      sparseCheckout:
                        description: |-
                          SparseCheckout specifies a list of directories to checkout when cloning
                          the repository. If specified, only these directories are included in the
                          Artifact produced for this GitRepository.
                        items:
                          type: string
                        type: array
                      suspend:
                        description: |-
                          Suspend tells the controller to suspend the reconciliation of this
                          GitRepository.
                        type: boolean
                      timeout:
                        default: 60s
                        description: Timeout for Git operations like cloning, defaults
                          to 60s.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m))+$
                        type: string
                      url:
                        description: URL specifies the Git repository URL, it can
                          be an HTTP/S or SSH address.
                        pattern: ^(http|https|ssh)://.*$
                        type: string
                      verify:
                        description: |-
                          Verification specifies the configuration to verify the Git commit
                          signature(s).
                        properties:
                          mode:
                            default: HEAD
                            description: |-
                              Mode specifies which Git object(s) should be verified.

                              The variants "head" and "HEAD" both imply the same thing, i.e. verify
                              the commit that the HEAD of the Git repository points to. The variant
                              "head" solely exists to ensure backwards compatibility.
                            enum:
                            - head
                            - HEAD
                            - Tag
                            - TagAndHEAD
                            type: string
                          secretRef:
                            description: |-
                              SecretRef specifies the Secret containing the public keys of trusted Git
                              authors.
                            properties:
                              name:
                                description: Name of the referent.
                                type: string
                            required:
                            - name
                            type: object
                        required:
                        - secretRef
                        type: object
                    required:
                    - interval
                    - url
                    type: object
                    x-kubernetes-validations:
                    - message: serviceAccountName can only be set when provider is
                        'azure'
                      rule: '!has(self.serviceAccountName) || (has(self.provider)
                        && self.provider == ''azure'')'
                  helm:
                    description: |-
                      HelmRepositorySpec specifies the required configuration to produce an
                      Artifact for a Helm repository index YAML.
                    properties:
                      accessFrom:
                        description: |-
                          AccessFrom specifies an Access Control List for allowing cross-namespace
                          references to this object.
                          NOTE: Not implemented, provisional as of https://github.com/fluxcd/flux2/pull/2092
                        properties:
                          namespaceSelectors:
                            description: |-
                              NamespaceSelectors is the list of namespace selectors to which this ACL applies.
                              Items in this list are evaluated using a logical OR operation.
                            items:
                              description: |-
                                NamespaceSelector selects the namespaces to which this ACL applies.
                                An empty map of MatchLabels matches all namespaces in a cluster.
                              properties:
                                matchLabels:
                                  additionalProperties:
                                    type: string
                                  description: |-
                                    MatchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                    map is equivalent to an element of matchExpressions, whose key field is "key", the
                                    operator is "In", and the values array contains only "value". The requirements are ANDed.
                                  type: object
                              type: object
                            type: array
                        required:
                        - namespaceSelectors
                        type: object
                      certSecretRef:
                        description: |-
                          CertSecretRef can be given the name of a Secret containing
                          either or both of

                          - a PEM-encoded client certificate (`tls.crt`) and private
                          key (`tls.key`);
                          - a PEM-encoded CA certificate (`ca.crt`)

                          and whichever are supplied, will be used for connecting to the
                          registry. The client cert and key are useful if you are
                          authenticating with a certificate; the CA cert is useful if
                          you are using a self-signed server certificate. The Secret must
                          be of type `Opaque` or `kubernetes.io/tls`.

                          It takes precedence over the values specified in the Secret referred
                          to by `.spec.secretRef`.
                        properties:
                          name:
                            description: Name of the referent.
                            type: string
                        required:
                        - name
                        type: object
                      insecure:
                        description: |-
                          Insecure allows connecting to a non-TLS HTTP container registry.
                          This field is only taken into account if the .spec.type field is set to 'oci'.
                        type: boolean
                      interval:
                        description: |-
                          Interval at which the HelmRepository URL is checked for updates.
                          This interval is approximate and may be subject to jitter to ensure
                          efficient use of resources.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m|h))+$
                        type: string
                      passCredentials:
                        description: |-
                          PassCredentials allows the credentials from the SecretRef to be passed
                          on to a host that does not match the host as defined in URL.
                          This may be required if the host of the advertised chart URLs in the
                          index differ from the defined URL.
                          Enabling this should be done with caution, as it can potentially result
                          in credentials getting stolen in a MITM-attack.
                        type: boolean
                      provider:
                        default: generic
                        description: |-
                          Provider used for authentication, can be 'aws', 'azure', 'gcp' or 'generic'.
                          This field is optional, and only taken into account if the .spec.type field is set to 'oci'.
                          When not specified, defaults to 'generic'.
                        enum:
                        - generic
                        - aws
                        - azure
                        - gcp
                        type: string
                      secretRef:
                        description: |-
                          SecretRef specifies the Secret containing authentication credentials
                          for the HelmRepository.
                          For HTTP/S basic auth the secret must contain 'username' and 'password'
                          fields.
                          Support for TLS auth using the 'certFile' and 'keyFile', and/or 'caFile'
                          keys is deprecated. Please use `.spec.certSecretRef` instead.
                        properties:
                          name:
                            description: Name of the referent.
                            type: string
                        required:
                        - name
                        type: object
                      suspend:
                        description: |-
                          Suspend tells the controller to suspend the reconciliation of this
                          HelmRepository.
                        type: boolean
                      timeout:
                        description: |-
                          Timeout is used for the index fetch operation for an HTTPS helm repository,
                          and for remote OCI Repository operations like pulling for an OCI helm
                          chart by the associated HelmChart.
                          Its default value is 60s.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m))+$
                        type: string
                      type:
                        description: |-
                          Type of the HelmRepository.
                          When this field is set to  "oci", the URL field value must be prefixed with "oci://".
                        enum:
                        - default
                        - oci
                        type: string
                      url:
                        description: |-
                          URL of the Helm repository, a valid URL contains at least a protocol and
                          host.
                        pattern: ^(http|https|oci)://.*$
                        type: string
                    required:
                    - url
                    type: object
                  oci:
                    description: OCIRepositorySpec defines the desired state of OCIRepository
                    properties:
                      certSecretRef:
                        description: |-
                          CertSecretRef can be given the name of a Secret containing
                          either or both of

                          - a PEM-encoded client certificate (`tls.crt`) and private
                          key (`tls.key`);
                          - a PEM-encoded CA certificate (`ca.crt`)

                          and whichever are supplied, will be used for connecting to the
                          registry. The client cert and key are useful if you are
                          authenticating with a certificate; the CA cert is useful if
                          you are using a self-signed server certificate. The Secret must
                          be of type `Opaque` or `kubernetes.io/tls`.
                        properties:
                          name:
                            description: Name of the referent.
                            type: string
                        required:
                        - name
                        type: object
                      ignore:
                        description: |-
                          Ignore overrides the set of excluded patterns in the .sourceignore format
                          (which is the same as .gitignore). If not provided, a default will be used,
                          consult the documentation for your version to find out what those are.
                        type: string
                      insecure:
                        description: Insecure allows connecting to a non-TLS HTTP
                          container registry.
                        type: boolean
                      interval:
                        description: |-
                          Interval at which the OCIRepository URL is checked for updates.
                          This interval is approximate and may be subject to jitter to ensure
                          efficient use of resources.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m|h))+$
                        type: string
                      layerSelector:
                        description: |-
                          LayerSelector specifies which layer should be extracted from the OCI artifact.
                          When not specified, the first layer found in the artifact is selected.
                        properties:
                          mediaType:
                            description: |-
                              MediaType specifies the OCI media type of the layer
                              which should be extracted from the OCI Artifact. The
                              first layer matching this type is selected.
                            type: string
                          operation:
                            description: |-
                              Operation specifies how the selected layer should be processed.
                              By default, the layer compressed content is extracted to storage.
                              When the operation is set to 'copy', the layer compressed content
                              is persisted to storage as it is.
                            enum:
                            - extract
                            - copy
                            type: string
                        type: object
                      provider:
                        default: generic
                        description: |-
                          The provider used for authentication, can be 'aws', 'azure', 'gcp' or 'generic'.
                          When not specified, defaults to 'generic'.
                        enum:
                        - generic
                        - aws
                        - azure
                        - gcp
                        type: string
                      proxySecretRef:
                        description: |-
                          ProxySecretRef specifies the Secret containing the proxy configuration
                          to use while communicating with the container registry.
                        properties:
                          name:
                            description: Name of the referent.
                            type: string
                        required:
                        - name
                        type: object
                      ref:
                        description: |-
                          The OCI reference to pull and monitor for changes,
                          defaults to the latest tag.
                        properties:
                          digest:
                            description: |-
                              Digest is the image digest to pull, takes precedence over SemVer.
                              The value should be in the format 'sha256:<HASH>'.
                            type: string
                          semver:
                            description: |-
                              SemVer is the range of tags to pull selecting the latest within
                              the range, takes precedence over Tag.
                            type: string
                          semverFilter:
                            description: SemverFilter is a regex pattern to filter
                              the tags within the SemVer range.
                            type: string
                          tag:
                            description: Tag is the image tag to pull, defaults to
                              latest.
                            type: string
                        type: object
                      secretRef:
                        description: |-
                          SecretRef contains the secret name containing the registry login
                          credentials to resolve image metadata.
                          The secret must be of type kubernetes.io/dockerconfigjson.
                        properties:
                          name:
                            description: Name of the referent.
                            type: string
                        required:
                        - name
                        type: object
                      serviceAccountName:
                        description: |-
                          ServiceAccountName is the name of the Kubernetes ServiceAccount used to authenticate
                          the image pull if the service account has attached pull secrets. For more information:
                          https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/#add-imagepullsecrets-to-a-service-account
                        type: string
                      suspend:
                        description: This flag tells the controller to suspend the
                          reconciliation of this source.
                        type: boolean
                      timeout:
                        default: 60s
                        description: The timeout for remote OCI Repository operations
                          like pulling, defaults to 60s.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m))+$
                        type: string
                      url:
                        description: |-
                          URL is a reference to an OCI artifact repository hosted
                          on a remote container registry.
                        pattern: ^oci://.*$
                        type: string
                      verify:
                        description: |-
                          Verify contains the secret name containing the trusted public keys
                          used to verify the signature and specifies which provider to use to check
                          whether OCI image is authentic.
                        properties:
                          matchOIDCIdentity:
                            description: |-
                              MatchOIDCIdentity specifies the identity matching criteria to use
                              while verifying an OCI artifact which was signed using Cosign keyless
                              signing. The artifact's identity is deemed to be verified if any of the
                              specified matchers match against the identity.
                            items:
                              description: |-
                                OIDCIdentityMatch specifies options for verifying the certificate identity,
                                i.e. the issuer and the subject of the certificate.
                              properties:
                                issuer:
                                  description: |-
                                    Issuer specifies the regex pattern to match against to verify
                                    the OIDC issuer in the Fulcio certificate. The pattern must be a
                                    valid Go regular expression.
                                  type: string
                                subject:
                                  description: |-
                                    Subject specifies the regex pattern to match against to verify
                                    the identity subject in the Fulcio certificate. The pattern must
                                    be a valid Go regular expression.
                                  type: string
                              required:
                              - issuer
                              - subject
                              type: object
                            type: array
                          provider:
                            default: cosign
                            description: Provider specifies the technology used to
                              sign the OCI Artifact.
                            enum:
                            - cosign
                            - notation
                            type: string
                          secretRef:
                            description: |-
                              SecretRef specifies the Kubernetes Secret containing the
                              trusted public keys.
                            properties:
                              name:
                                description: Name of the referent.
                                type: string
                            required:
                            - name
                            type: object
                        required:
                        - provider
                        type: object
                    required:
                    - interval
                    - url
                    type: object
                type: object
                x-kubernetes-validations:
                - message: chartName must be set for git and helm sources
                  rule: '(has(self.git) || has(self.helm)) ? (has(self.chartName)
                    && size(self.chartName) > 0) : true'
                - message: exactly one of the fields in [helm git oci] must be set
                  rule: '[has(self.helm),has(self.git),has(self.oci)].filter(x,x==true).size()
                    == 1'
              commonMetadata:
                description: |-
                  CommonMetadata allows to specify common metadata for the HelmRelease, e.g. labels and annotations.
                  Inherited from HelmRelease spec.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations to be added to the object's metadata.
                    type: object
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels to be added to the object's metadata.
                    type: object
                type: object
              healthCheckExprs:
                description: |-
                  HealthCheckExprs allows to specify custom health checks for the HelmRelease.
                  Inherited from HelmRelease spec.
                items:
                  description: CustomHealthCheck defines the health check for custom
                    resources.
                  properties:
                    apiVersion:
                      description: APIVersion of the custom resource under evaluation.
                      type: string
                    current:
                      description: |-
                        Current is the CEL expression that determines if the status
                        of the custom resource has reached the desired state.
                      type: string
                    failed:
                      description: |-
                        Failed is the CEL expression that determines if the status
                        of the custom resource has failed to reach the desired state.
                      type: string
                    inProgress:
                      description: |-
                        InProgress is the CEL expression that determines if the status
                        of the custom resource has not yet reached the desired state.
                      type: string
                    kind:
                      description: Kind of the custom resource under evaluation.
                      type: string
                  required:
                  - apiVersion
                  - current
                  type: object
                type: array
              helmValues:
                description: |-
                  HelmValues are the helm values to deploy the chart with.
                  There are a few special strings which will be replaced before creating the HelmRelease:
                  - <provider.name> will be replaced with the provider name resource.
                  - <provider.namespace> will be replaced with the namespace that hosts the platform service.
                  - <environment> will be replaced with the environment name of the operator.
                  - <helm.name> will be replaced with the name of the HelmDeployment.
                  - <helm.namespace> will be replaced with the namespace of the HelmDeployment.
                  - <cluster.name> will be replaced with the name of the reconciled Cluster.
                  - <cluster.namespace> will be replaced with the namespace of the reconciled Cluster.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              install:
                description: |-
                  Install allows to overwrite the default install options for the HelmRelease.
                  Inherited from HelmRelease spec.
                properties:
                  crds:
                    description: |-
                      CRDs upgrade CRDs from the Helm Chart's crds directory according
                      to the CRD upgrade policy provided here. Valid values are `Skip`,
                      `Create` or `CreateReplace`. Default is `Create` and if omitted
                      CRDs are installed but not updated.

                      Skip: do neither install nor replace (update) any CRDs.

                      Create: new CRDs are created, existing CRDs are neither updated nor deleted.

                      CreateReplace: new CRDs are created, existing CRDs are updated (replaced)
                      but not deleted.

                      By default, CRDs are applied (installed) during Helm install action.
                      With this option users can opt in to CRD replace existing CRDs on Helm
                      install actions, which is not (yet) natively supported by Helm.
                      https://helm.sh/docs/chart_best_practices/custom_resource_definitions.
                    enum:
                    - Skip
                    - Create
                    - CreateReplace
                    type: string
                  createNamespace:
                    description: |-
                      CreateNamespace tells the Helm install action to create the
                      HelmReleaseSpec.TargetNamespace if it does not exist yet.
                      On uninstall, the namespace will not be garbage collected.
                    type: boolean
                  disableHooks:
                    description: DisableHooks prevents hooks from running during the
                      Helm install action.
                    type: boolean
                  disableOpenAPIValidation:
                    description: |-
                      DisableOpenAPIValidation prevents the Helm install action from validating
                      rendered templates against the Kubernetes OpenAPI Schema.
                    type: boolean
                  disableSchemaValidation:
                    description: |-
                      DisableSchemaValidation prevents the Helm install action from validating
                      the values against the JSON Schema.
                    type: boolean
                  disableTakeOwnership:
                    description: |-
                      DisableTakeOwnership disables taking ownership of existing resources
                      during the Helm install action. Defaults to false.
                    type: boolean
                  disableWait:
                    description: |-
                      DisableWait disables the waiting for resources to be ready after a Helm
                      install has been performed.
                    type: boolean
                  disableWaitForJobs:
                    description: |-
                      DisableWaitForJobs disables waiting for jobs to complete after a Helm
                      install has been performed.
                    type: boolean
                  remediation:
                    description: |-
                      Remediation holds the remediation configuration for when the Helm install
                      action for the HelmRelease fails. The default is to not perform any action.
                    properties:
                      ignoreTestFailures:
                        description: |-
                          IgnoreTestFailures tells the controller to skip remediation when the Helm
                          tests are run after an install action but fail. Defaults to
                          'Test.IgnoreFailures'.
                        type: boolean
                      remediateLastFailure:
                        description: |-
                          RemediateLastFailure tells the controller to remediate the last failure, when
                          no retries remain. Defaults to 'false'.
                        type: boolean
                      retries:
                        description: |-
                          Retries is the number of retries that should be attempted on failures before
                          bailing. Remediation, using an uninstall, is performed between each attempt.
                          Defaults to '0', a negative integer equals to unlimited retries.
                        type: integer
                    type: object
                  replace:
                    description: |-
                      Replace tells the Helm install action to re-use the 'ReleaseName', but only
                      if that name is a deleted release which remains in the history.
                    type: boolean
                  serverSideApply:
                    description: |-
                      ServerSideApply enables server-side apply for resources during install.
                      Defaults to true (or false when UseHelm3Defaults feature gate is enabled).
                    type: boolean
                  skipCRDs:
                    description: |-
                      SkipCRDs tells the Helm install action to not install any CRDs. By default,
                      CRDs are installed if not already present.

                      Deprecated use CRD policy (`crds`) attribute with value `Skip` instead.
                    type: boolean
                  strategy:
                    description: |-
                      Strategy defines the install strategy to use for this HelmRelease.
                      Defaults to 'RemediateOnFailure', or 'RetryOnFailure' when the
                      DefaultToRetryOnFailure feature gate is enabled.
                    properties:
                      name:
                        description: Name of the install strategy.
                        enum:
                        - RemediateOnFailure
                        - RetryOnFailure
                        type: string
                      retryInterval:
                        description: |-
                          RetryInterval is the interval at which to retry a failed install.
                          Can be used only when Name is set to RetryOnFailure.
                          Defaults to '5m'.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m|h))+$
                        type: string
                    required:
                    - name
                    type: object
                    x-kubernetes-validations:
                    - message: .retryInterval cannot be set when .name is 'RemediateOnFailure'
                      rule: '!has(self.retryInterval) || self.name != ''RemediateOnFailure'''
                  timeout:
                    description: |-
                      Timeout is the time to wait for any individual Kubernetes operation (like
                      Jobs for hooks) during the performance of a Helm install action. Defaults to
                      'HelmReleaseSpec.Timeout'.
